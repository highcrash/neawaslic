# License stack — single-droplet deployment (neawaslic.top).
#
# Four containers on one $6-$12 DO droplet. Caddy terminates TLS (ACME
# auto-issue via Let's Encrypt), postgres runs locally, the app images
# are built from the monorepo via the `build:` stanzas below.
#
# Why not App Platform: this stack is low-traffic (a few hundred verify
# calls/day at most for a CodeCanyon item) and a $6 droplet beats the
# App Platform equivalent ($5 web + $5 static + $15 managed Postgres).
#
# Deploy flow lives in infra/license-droplet/README.md + provision.sh.

name: restora-license

services:
  # ─── Caddy ─── public entry. Terminates TLS for both hostnames and
  # reverse-proxies to the right container. ACME state persists in the
  # caddy-data volume so certificates survive restarts.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - license-server
      - license-admin

  # ─── License server (NestJS, port 3002 inside the container) ──────
  license-server:
    build:
      # Build context is the repo root — the Dockerfile needs workspace
      # package.json files + pnpm-lock to install correctly.
      context: ../..
      dockerfile: apps/license-server/Dockerfile
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      # Runtime secrets (KEK / pepper / JWT / bcrypt admin hash). Lives
      # in a separate file from .env because compose interpolates env_file
      # values — keeping bcrypt's $-laden hash in the auto-loaded .env
      # would mangle it into substring substitutions. .env.secrets is
      # NOT auto-loaded for YAML interpolation; values pass through raw.
      # (You still need to escape $ as $$ in .env.secrets — see template.)
      - ./.env.secrets
    environment:
      NODE_ENV: production
      PORT: "3002"
      # Docker network hostname for the sibling postgres container — the
      # compose service name resolves to its container IP.
      LICENSE_DB_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      LICENSE_ADMIN_ORIGIN: "https://admin.neawaslic.top"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # node ships in the image; wget/curl don't. Hits the server's own
      # /health endpoint which does a SELECT 1 against Postgres. Block
      # scalar form keeps the require(...) string readable.
      test:
        - CMD
        - node
        - -e
        - require("node:http").get("http://localhost:3002/api/v1/health",r=>process.exit(r.statusCode===200?0:1)).on("error",()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── License admin UI (static, served by nginx) ───────────────────
  license-admin:
    build:
      context: ../..
      dockerfile: apps/license-admin/Dockerfile
      args:
        # Baked into the bundle at build time — the SPA calls this URL
        # directly from the browser. Change requires a rebuild.
        VITE_LICENSE_API_BASE_URL: "https://api.neawaslic.top/api/v1"
    restart: unless-stopped
    expose:
      - "80"

  # ─── Postgres 15 ──────────────────────────────────────────────────
  # Local to the droplet, not reachable from the public internet (no port
  # publish — only the docker network can reach it). Backups handled by
  # infra/license-droplet/backup.sh + cron (see README).
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - license-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  license-pgdata:
  caddy-data:
  caddy-config:
